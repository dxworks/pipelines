name: Trivy Image Scan

on:
  workflow_call:
    inputs:
      image-ref:
        description: Docker image to scan. When build-context is set, this is used as the tag for the built image.
        type: string
        required: true
      build-context:
        description: Path to Docker build context (e.g. "."). When set, builds the image from Dockerfile instead of pulling it.
        type: string
        default: ''
      build-setup:
        description: Shell commands to run before docker build (e.g. "gradle clean build"). Empty to skip.
        type: string
        default: ''
      java-version:
        description: Java version to set up before build (empty to skip)
        type: string
        default: ''
      node-version:
        description: Node.js version to set up before build (empty to skip)
        type: string
        default: ''
      severity:
        description: Severity levels to report
        type: string
        default: MEDIUM,HIGH,CRITICAL
      fail-on-findings:
        description: Fail the workflow if vulnerabilities are found
        type: boolean
        default: true
      post-pr-comment:
        description: Post a PR comment with results (only works on pull_request events)
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  trivy-image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        if: inputs.java-version != ''
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      - name: Set up Node.js
        if: inputs.node-version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Run build setup
        if: inputs.build-setup != ''
        run: ${{ inputs.build-setup }}

      - name: Build Docker image
        if: inputs.build-context != ''
        run: docker build -t ${{ inputs.image-ref }} ${{ inputs.build-context }}

      - name: Run Trivy image scanner (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ inputs.image-ref }}
          format: table
          exit-code: 0
          severity: ${{ inputs.severity }}

      - name: Run Trivy image scanner (sarif)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ inputs.image-ref }}
          format: sarif
          output: trivy-image-results.sarif
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}
          severity: ${{ inputs.severity }}

      - name: Upload image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Checkout pipelines scripts
        if: always() && inputs.post-pr-comment && github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: dxworks/pipelines
          path: .pipelines

      - name: Post PR comment with image scan results
        if: always() && inputs.post-pr-comment && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const script = require('./.pipelines/scripts/trivy-pr-comment.js');
            await script({ github, context });
