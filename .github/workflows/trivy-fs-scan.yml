name: Trivy Filesystem Scan

on:
  workflow_call:
    inputs:
      severity:
        description: Severity levels to report
        type: string
        default: MEDIUM,HIGH,CRITICAL
      fail-on-findings:
        description: Fail the workflow if vulnerabilities are found
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: ${{ inputs.severity }}

      - name: Run Trivy filesystem scanner (sarif)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}
          severity: ${{ inputs.severity }}

      - name: Upload filesystem scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs
