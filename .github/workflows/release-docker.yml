name: Release Docker

on:
  workflow_call:
    inputs:
      version:
        description: Semver version string (e.g. 2.13.0)
        type: string
        required: true
      image-name:
        description: Docker image name (e.g. dxworks/insider)
        type: string
        required: true
      platforms:
        description: Comma-separated list of target platforms
        type: string
        default: linux/amd64,linux/arm64
      java-version:
        description: Java version to set up before build (empty to skip)
        type: string
        default: ''
      node-version:
        description: Node.js version to set up before build (empty to skip)
        type: string
        default: ''
      build-script:
        description: Path to build script to run before docker build (empty to skip)
        type: string
        default: ''
      context:
        description: Docker build context path
        type: string
        default: .
      dockerfile:
        description: Path to Dockerfile
        type: string
        default: Dockerfile
      push-dockerhub:
        description: Push to Docker Hub
        type: boolean
        default: true
      push-ghcr:
        description: Push to GitHub Container Registry
        type: boolean
        default: false
    secrets:
      dockerhub-username:
        required: false
      dockerhub-token:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        if: inputs.java-version != ''
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      - name: Set up Node.js
        if: inputs.node-version != ''
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Run build script
        if: inputs.build-script != ''
        run: |
          chmod +x ${{ inputs.build-script }}
          ${{ inputs.build-script }}

      - name: Build image for scanning
        run: |
          docker build -t ${{ inputs.image-name }}:scan \
            -f ${{ inputs.dockerfile }} \
            ${{ inputs.context }}

      - name: Trivy scan - block on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ inputs.image-name }}:scan
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Trivy scan - warn on other severities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ inputs.image-name }}:scan
          format: table
          exit-code: 0
          severity: MEDIUM,HIGH

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: inputs.push-dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Log in to GitHub Container Registry
        if: inputs.push-ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ${{ inputs.push-dockerhub && format('{0}:{1}', inputs.image-name, inputs.version) || '' }}
            ${{ inputs.push-dockerhub && format('{0}:latest', inputs.image-name) || '' }}
            ${{ inputs.push-ghcr && format('ghcr.io/{0}:{1}', inputs.image-name, inputs.version) || '' }}
            ${{ inputs.push-ghcr && format('ghcr.io/{0}:latest', inputs.image-name) || '' }}
